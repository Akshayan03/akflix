# Deploys the /website folder to GitHub Pages, bundling the latest release
# installers into the site under /downloads/ so download links are served
# first-party from the site's own origin (no redirect to github.com).
#
# Runs on: pushes to main that touch website/, every published release
# (so new installers appear on the site automatically), and manual dispatch.

name: Deploy website

on:
  push:
    branches: [main]
    paths: ["website/**", ".github/workflows/pages.yml"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Bundle latest release installers into the site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p website/downloads
          # A website-only push may happen before the first release exists.
          # Keep that deployment healthy; the page links users to Releases
          # until installers have been published and copied here.
          gh release download --repo "$GITHUB_REPOSITORY" \
            --dir website/downloads \
            --pattern "*.dmg" --pattern "*.exe" --pattern "*.msi" \
            --pattern "*.AppImage" --pattern "*.deb" || \
            echo "No published installers yet; deploying the website without bundled downloads."
          ls -lh website/downloads

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
