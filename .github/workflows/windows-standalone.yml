name: Build standalone Windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            curl
            make
            tar
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - run: npm ci

      - name: Download the official rqbit engine
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/ikatson/rqbit/releases/download/v9.0.0-beta.2/rqbit.exe" `
            -OutFile "src-tauri/binaries/rqbit-x86_64-pc-windows-msvc.exe"

      - name: Build the LGPL FFmpeg sidecar
        shell: msys2 {0}
        run: |
          set -euo pipefail
          curl -fL "https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz" -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          cd ffmpeg-8.1.2
          ./configure \
            --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-avdevice --disable-autodetect --disable-shared --enable-static \
            --enable-mediafoundation --enable-schannel --disable-x86asm
          make -j2 ffmpeg
          cp ffmpeg.exe ../src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe

      - name: Verify bundled engines
        shell: pwsh
        run: |
          $rqbit = "src-tauri/binaries/rqbit-x86_64-pc-windows-msvc.exe"
          $ffmpeg = "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          if (!(Test-Path $rqbit) -or !(Test-Path $ffmpeg)) { throw "A Windows sidecar is missing" }
          & $ffmpeg -hide_banner -version
          $encoders = (& $ffmpeg -hide_banner -encoders 2>&1 | Out-String)
          if ($encoders -notmatch "h264_mf") { throw "FFmpeg was built without Media Foundation H.264" }

      - name: Build Windows installers
        run: npx tauri build --config src-tauri/tauri.local.conf.json --bundles nsis,msi

      - uses: actions/upload-artifact@v4
        with:
          name: akflix-windows-standalone
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
